name: Pilot Config Sync

on:
  schedule:
    # Hourly from 8:00 AM to 11:30 PM IST (2:30–17:30 UTC).
    - cron: '30 2-17 * * *'
  workflow_dispatch: {}

concurrency:
  group: pilot-state-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      LEVELS_OF_INTEREST: ${{ vars.LEVELS_OF_INTEREST }}
      REPO_ROOT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git
        run: |
          git config user.name "pilot-state-sync[bot]"
          git config user.email "pilot-state-sync[bot]@users.noreply.github.com"

      - name: Sync nonprodqa
        env:
          BIDGELY_TOKEN_URL: ${{ vars.BIDGELY_TOKEN_URL_NONPRODQA }}
          BIDGELY_TOKEN_MODE: ${{ vars.BIDGELY_TOKEN_MODE_NONPRODQA }}
          BIDGELY_BASIC_AUTH: ${{ secrets.BIDGELY_BASIC_AUTH_NONPRODQA }}
          BIDGELY_TOKEN_SCOPE: ${{ vars.BIDGELY_TOKEN_SCOPE_NONPRODQA }}
          BIDGELY_ACCESS_TOKEN_FIELD: ${{ vars.BIDGELY_ACCESS_TOKEN_FIELD_NONPRODQA }}
          BIDGELY_TOKEN_EXTRA_BODY: ${{ vars.BIDGELY_TOKEN_EXTRA_BODY_NONPRODQA }}
          PILOT_CONFIGS: ${{ vars.PILOT_CONFIGS_NONPRODQA }}
          BIDGELY_ENV: nonprodqa
        run: |
          if [ -z "$PILOT_CONFIGS" ]; then
            echo "[sync] Skipping nonprodqa: configure PILOT_CONFIGS_NONPRODQA to enable this environment."
            exit 0
          fi
          if [ -z "$BIDGELY_TOKEN_URL" ] || [ -z "$BIDGELY_BASIC_AUTH" ]; then
            echo "[sync] Missing token mint configuration for nonprodqa."
            exit 1
          fi
          TOKEN="$(node scripts/mint-token.js)"
          echo "::add-mask::$TOKEN"
          BIDGELY_API_TOKEN="$TOKEN" node scripts/sync.js

      - name: Uat placeholder
        run: |
          echo "[sync] Skipping uat: Phase 2.5 currently activates nonprodqa only."

      - name: Prod placeholder
        run: |
          echo "[sync] Skipping prod: Phase 2.5 currently activates nonprodqa only."

      - name: Upload _meta as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-meta
          path: _meta/
          if-no-files-found: ignore

      - name: Push changes
        run: git push
