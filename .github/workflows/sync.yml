name: Pilot Config Sync

on:
  # Hourly cron — disabled by default until Gate 3 (manual dry run) passes.
  # Uncomment the schedule line below after a clean workflow_dispatch run.
  # schedule:
  #   - cron: '0 * * * *'
  workflow_dispatch: {}

concurrency:
  group: pilot-state-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync
        env:
          BIDGELY_API_TOKEN: ${{ secrets.BIDGELY_API_TOKEN }}
          PILOT_CONFIGS: ${{ vars.PILOT_CONFIGS }}
          BIDGELY_ENV: ${{ vars.BIDGELY_ENV }}
          REPO_ROOT: ${{ github.workspace }}
        run: node scripts/sync.js

      - name: Upload _meta as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-meta
          path: _meta/
          if-no-files-found: ignore

      - name: Push changes
        run: |
          git config user.name "pilot-state-sync[bot]"
          git config user.email "pilot-state-sync[bot]@users.noreply.github.com"
          git push
